<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Rajeev Kumar Gupta</title>
  <meta name="description" content="Photo gallery of Rajeev Kumar Gupta's travels across India and beyond." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="container">
      <a class="nav-brand" href="index.html">Rajeev<span> Kumar Gupta</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="index.html#newsletter">Newsletter</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon" id="themeIcon">🌙</span>
          <span id="themeLabel">Dark</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </header>

  <!-- Hero -->
  <section class="gallery-hero">
    <div class="container" style="text-align:center;">
      <p class="hero-eyebrow">Through My Lens</p>
      <h1 style="font-size:clamp(2rem,5vw,3.2rem); margin-bottom:12px;">Places I've <em style="color:var(--accent);font-style:italic;">Visited</em></h1>
      <p style="color:var(--text-muted); font-size:1.05rem; max-width:480px; margin:0 auto;">
        Click any place to explore all photos from that visit.
      </p>
    </div>
  </section>

  <!-- Region Filters -->
  <section class="gallery-filter-section">
    <div class="container">
      <div class="gallery-filters" id="galleryFilters">
        <button class="cat-btn active" data-region="all">All Places</button>
        <button class="cat-btn" data-region="madhya-pradesh">Madhya Pradesh</button>
        <button class="cat-btn" data-region="gujarat">Gujarat</button>
        <button class="cat-btn" data-region="maharashtra">Maharashtra</button>
        <button class="cat-btn" data-region="karnataka">Karnataka</button>
        <button class="cat-btn" data-region="kerala">Kerala</button>
      </div>
      <p class="gallery-count" id="galleryCount">20 places</p>
    </div>
  </section>

  <!-- Albums Grid -->
  <main class="container" style="padding: 40px 24px 80px;">
    <div class="album-grid" id="albumGrid">
      <!-- Rendered by gallery.js -->
    </div>
  </main>

  <!-- ===== Album Modal ===== -->
  <div class="album-modal" id="albumModal">
    <div class="album-modal-inner">

      <!-- Modal Header -->
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Place Name</h2>
          <p id="modalState" style="font-size:0.85rem; color:var(--text-muted); margin-top:2px;"></p>
        </div>
        <div class="modal-header-right">
          <span class="modal-count" id="modalPhotoCount"></span>

          <!-- View Toggle -->
          <div class="view-toggle">
            <button class="view-btn active" data-view="grid" onclick="setView('grid')" title="Grid View">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              Grid
            </button>
            <button class="view-btn" data-view="masonry" onclick="setView('masonry')" title="Masonry View">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="10" rx="1"/><rect x="14" y="3" width="7" height="6" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/></svg>
              Masonry
            </button>
            <button class="view-btn" data-view="slideshow" onclick="setView('slideshow')" title="Slideshow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/></svg>
              Slideshow
            </button>
          </div>

          <button class="modal-close" onclick="closeAlbum()">&times;</button>
        </div>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        <div class="modal-content" id="modalContent">
          <!-- Rendered by gallery.js -->
        </div>
      </div>

    </div>
  </div>

  <!-- ===== Lightbox ===== -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <button class="lightbox-prev" id="lbPrev" onclick="lbNavigate(-1, event)">&#8249;</button>
    <button class="lightbox-next" id="lbNext" onclick="lbNavigate(1, event)">&#8250;</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightboxImg" src="" alt="" />
      <div class="lightbox-caption">
        <h3 id="lightboxPlace"></h3>
        <p id="lightboxCaption"></p>
        <span id="lbCounter" style="font-size:0.8rem; opacity:0.6;"></span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 Rajeev Kumar Gupta · <a href="index.html">Back to Blog</a></p>
        <div class="social-links">
          <a href="https://x.com/rajeevgupta39" class="social-link" title="Twitter">𝕏</a>
          <a href="https://instagram.com/irajeevkgupta" class="social-link" title="Instagram">📸</a>
          <a href="https://www.linkedin.com/in/rajeev-kumar-gupta-26682623/" class="social-link" title="LinkedIn">in</a>
          <a href="https://www.facebook.com/rajeevgupta39" class="social-link" title="Facebook">fb</a>
        </div>
      </div>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">↑</button>

  <script src="protection.js"></script>
  <script src="script.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
